[tool.ruff]
target-version = "py311"
exclude = [".git", "venv", ".venv", "node_modules", "build", "dist", ".my", ".nx"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "N", "UP", "B", "C4"]

[tool.ruff.lint.pycodestyle]
max-line-length = 120

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.isort]
known-first-party = ["etl_service", "prefect_orchestrator", "db_client", "eodhd_client"]
section-order = ["future", "standard-library", "third-party", "first-party", "local-folder"]
force-sort-within-sections = true
