services:
  timescaledb-dev:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-dev
    environment:
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_pass
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data_dev:/var/lib/postgresql/data
    networks:
      - enterprise-network
    restart: always

  timescaledb-prod:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-prod
    environment:
      - POSTGRES_USER=prod_user
      - POSTGRES_PASSWORD=prod_pass
    ports:
      - "5435:5432"
    volumes:
      - timescaledb_data_prod:/var/lib/postgresql/data
    networks:
      - enterprise-network
    restart: always

  pgadmin-dev:
    image: dpage/pgadmin4
    container_name: pgadmin-dev
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@enterprise.dev
      - PGADMIN_DEFAULT_PASSWORD=admin_pass
    ports:
      - "5050:80"
    networks:
      - enterprise-network
    depends_on:
      - timescaledb-dev
    restart: always

  pgadmin-prd:
    image: dpage/pgadmin4
    container_name: pgadmin-prd
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@enterprise.prd
      - PGADMIN_DEFAULT_PASSWORD=admin_pass
    ports:
      - "5051:80"
    networks:
      - enterprise-network
    depends_on:
      - timescaledb-prod
    restart: always

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - enterprise-network
    restart: always

networks:
  enterprise-network:
    name: enterprise-network
    driver: bridge

volumes:
  timescaledb_data_dev:
  timescaledb_data_prod:
  jenkins_home:
