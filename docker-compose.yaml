services:
  timescaledb-dev:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-dev
    environment:
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_pass
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data_dev:/var/lib/postgresql/data
    networks:
      - enterprise-network
    restart: always

  timescaledb-prod:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-prod
    environment:
      - POSTGRES_USER=prod_user
      - POSTGRES_PASSWORD=prod_pass
    ports:
      - "5435:5432"
    volumes:
      - timescaledb_data_prod:/var/lib/postgresql/data
    networks:
      - enterprise-network
    restart: always

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    ports:
      - "8978:8978"
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - enterprise-network
    depends_on:
      - timescaledb-dev
      - timescaledb-prod
    restart: always

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - enterprise-network
    restart: always

networks:
  enterprise-network:
    external: true

volumes:
  timescaledb_data_dev:
  timescaledb_data_prod:
  cloudbeaver_data:
  jenkins_home:
