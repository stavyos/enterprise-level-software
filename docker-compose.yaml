services:
  timescaledb-dev:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-dev
    environment:
      - POSTGRES_USER=dev_user
      - POSTGRES_PASSWORD=dev_pass
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data_dev:/var/lib/postgresql/data
    networks:
      - enterprise-network
    restart: always

  timescaledb-prod:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb-prod
    environment:
      - POSTGRES_USER=prod_user
      - POSTGRES_PASSWORD=prod_pass
    ports:
      - "5435:5432"
    volumes:
      - timescaledb_data_prod:/var/lib/postgresql/data
    networks:
      - enterprise-network
    restart: always

  cloudbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: cloudbeaver
    ports:
      - "8978:8978"
    environment:
      - CB_ADMIN_NAME=${CLOUDBEAVER_ADMIN_USER:-cbadmin}
      - CB_ADMIN_PASSWORD=${CLOUDBEAVER_ADMIN_PASSWORD:-cbadmin}
    volumes:
      - cloudbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - enterprise-network
    depends_on:
      - timescaledb-dev
      - timescaledb-prod
    restart: always

  jenkins:
    image: jenkins/jenkins:lts
    container_name: jenkins
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - ../../jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - enterprise-network
    restart: always

  prefect-server:
    image: prefecthq/prefect:3.6.25-python3.12
    container_name: prefect-server
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      - PREFECT_API_URL=http://127.0.0.1:4200/api
    volumes:
      - prefect_data:/root/.prefect
    networks:
      - enterprise-network
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4200/api/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  prefect-init:
    image: prefecthq/prefect:3.6.25-python3.12
    container_name: prefect-init
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Waiting for Prefect server..."
        until prefect work-pool ls > /dev/null 2>&1; do sleep 2; done
        echo "Creating work pools..."
        prefect work-pool create dev-k8s-pool --type docker --if-not-exists
        prefect work-pool create prod-k8s-pool --type docker --if-not-exists
        echo "Work pools ready!"
    networks:
      - enterprise-network
    depends_on:
      prefect-server:
        condition: service_healthy
    restart: "no"

  prefect-worker-dev:
    image: prefecthq/prefect:3.6.25-python3.12
    container_name: prefect-worker-dev
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install prefect-docker && prefect worker start --pool dev-k8s-pool --type docker
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - enterprise-network
    depends_on:
      prefect-server:
        condition: service_healthy
    restart: always

  prefect-worker-prod:
    image: prefecthq/prefect:3.6.25-python3.12
    container_name: prefect-worker-prod
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        pip install prefect-docker && prefect worker start --pool prod-k8s-pool --type docker
    environment:
      - PREFECT_API_URL=http://prefect-server:4200/api
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - enterprise-network
    depends_on:
      prefect-server:
        condition: service_healthy
    restart: always

networks:
  enterprise-network:
    external: true

volumes:
  timescaledb_data_dev:
  timescaledb_data_prod:
  cloudbeaver_data:
  prefect_data:
